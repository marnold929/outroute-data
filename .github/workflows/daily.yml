name: Daily rankings build

on:
  schedule:
    # Twice daily: 9:00 and 21:00 UTC — morning rankings + evening news refresh
    - cron: "0 9,21 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab
  push:
    paths:
      - "pipeline/**"     # rebuild whenever the model or overrides change

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build players.json
        env:
          # Optional — when this repo secret is set, the build adds AI one-line
          # takes ("ai" field). Absent/invalid keys skip cleanly.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/build.py

      - name: Commit & publish if changed
        run: |
          git config user.name "outroute-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/players.json
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily rankings update $(date -u +%F)"
            git push
          fi
